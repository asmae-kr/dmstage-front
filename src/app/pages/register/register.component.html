<h2>Inscription</h2>
<form (ngSubmit)="onSubmit()">
  <input type="text" placeholder="Nom" [(ngModel)]="nom" name="nom" required />
  <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required />
  <input type="password" placeholder="Mot de passe" [(ngModel)]="motDePasse" name="motDePasse" required />
  <button type="submit">S'inscrire</button>
  <p *ngIf="erreur" style="color: red">{{ erreur }}</p>
</form>
